<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF5234">
  <title>Sports Day</title>
  <meta name="description" content="Live sports day scoring — record event results from any phone, watch house standings update in real time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- ===== Top bar ===== -->
  <header class="topbar no-print">
    <div class="wrap">
      <a class="brand" href="#/">
        <span class="mark">🏅</span>
        <span>Sports <span class="gold-accent">Day</span></span>
      </a>
      <a id="meet-label" class="chip meet-switch" href="#/meets" hidden title="Switch meet"></a>
      <nav class="tabs">
        <a class="tab" data-route="/" href="#/">Board</a>
        <a class="tab" data-route="/record" href="#/record">Record</a>
        <a class="tab" data-route="/admin" href="#/admin">Admin</a>
        <a class="tab" data-route="/setup" href="#/setup">Setup</a>
      </nav>
      <span id="conn-chip" class="conn" title="Connection"></span>
    </div>
  </header>

  <!-- ===== Views (router shows one) ===== -->
  <main>
    <section id="view-lobby"     class="view" hidden></section>
    <section id="view-spectator" class="view" hidden></section>
    <section id="view-record"    class="view" hidden></section>
    <section id="view-admin"     class="view" hidden></section>
    <section id="view-setup"     class="view" hidden></section>
    <section id="view-loading"   class="view">
      <div class="wrap" style="padding-top:18vh">
        <div class="empty"><div class="numeral" style="font-size:2rem">🏅</div><p>Loading…</p></div>
      </div>
    </section>
  </main>

  <!-- ===== Scripts (no build step; raw fetch, no supabase-js) ===== -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/live.js"></script>
  <script src="assets/js/export.js"></script>
  <script src="assets/js/lobby.js"></script>
  <script src="assets/js/setup.js"></script>
  <script src="assets/js/record.js"></script>
  <script src="assets/js/admin.js"></script>
  <script src="assets/js/spectator.js"></script>
  <script src="assets/js/router.js"></script>
</body>
</html>
